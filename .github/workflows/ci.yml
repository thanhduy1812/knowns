name: CI

on:
  push:
    branches: [main, develop]  # Only runs when merged to main/develop
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]  # Runs on PR open, update, reopen

# Cancel in-progress runs when a new run is triggered on same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint and Unit Tests (multiple Node versions)
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']

    name: Lint & Test (Node ${{ matrix.node-version }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run tests with coverage
        run: pnpm test -- --coverage

      - name: Upload coverage report
        if: matrix.node-version == '20'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Job 2: Build and E2E Tests on multiple OS and Node versions
  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ['20', '22', '24']

    name: E2E (${{ matrix.os }}, Node ${{ matrix.node-version }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Verify build output
        shell: bash
        run: |
          echo "=== Checking build output ==="
          ls -la dist/
          test -f dist/index.js || (echo "Error: dist/index.js not found" && exit 1)
          test -f dist/mcp/server.js || (echo "Error: dist/mcp/server.js not found" && exit 1)
          echo "✅ Build verification passed"

      # ============================================
      # CLI Tests
      # ============================================
      - name: CLI Basic Tests
        run: pnpm run test:cli

      - name: CLI E2E Workflow Tests
        run: pnpm run test:cli:e2e

      # ============================================
      # MCP Tests
      # ============================================
      - name: Setup MCP test project
        shell: bash
        run: |
          echo "=== Setting up MCP test project ==="
          mkdir -p test-project-mcp
          cd test-project-mcp
          git init
          node ../dist/index.js init mcp-test --no-wizard
          # Enable semantic search: model set downloads if needed, enables, and sets model
          node ../dist/index.js model set all-MiniLM-L6-v2
          node ../dist/index.js search --reindex
          echo "✅ MCP test project ready"

      - name: MCP Basic Tests
        shell: bash
        run: TEST_PROJECT_PATH="$(pwd)/test-project-mcp" pnpm run test:mcp

      - name: MCP E2E Workflow Tests
        shell: bash
        run: TEST_PROJECT_PATH="$(pwd)/test-project-mcp" pnpm run test:mcp:e2e

      - name: Cleanup test projects
        shell: bash
        if: always()
        run: |
          rm -rf test-project-mcp test-project-cli test-project-cli-e2e || true

      - name: Final summary
        shell: bash
        run: |
          echo ""
          echo "✅✅✅ All E2E tests passed on ${{ matrix.os }} with Node ${{ matrix.node-version }}! ✅✅✅"
